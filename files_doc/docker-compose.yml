version: '3.8'

services:
  # Service PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: banque_db
    environment:
      POSTGRES_DB: banque_db
      POSTGRES_USER: banque_user
      POSTGRES_PASSWORD: banque_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./SCHEMA_SQL_PostgreSQL.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - banque_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banque_user -d banque_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service Symfony
  symfony:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banque_symfony
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://banque_user:banque_password@db:5432/banque_db
      APP_ENV: dev
      APP_DEBUG: "1"
      SYMFONY_VERSION: 7
    volumes:
      - .:/app
      - /app/var
      - /app/vendor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - banque_network
    command: symfony serve --no-tls

  # Service Nginx (optionnel)
  nginx:
    image: nginx:alpine
    container_name: banque_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/app
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - symfony
    networks:
      - banque_network

volumes:
  postgres_data:
    driver: local

networks:
  banque_network:
    driver: bridge
