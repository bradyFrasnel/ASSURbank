version: '3.8'

services:
  database:
    image: postgres:16-alpine
    container_name: assurbank_db_container
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: assurbank_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: