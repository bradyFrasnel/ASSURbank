# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# This file is the entry point to configure the routes of your app.
# Methods with the #[Route] attribute are automatically imported.
# See also https://symfony.com/doc/current/routing.html

# To list all registered routes, run the following command:
#   bin/console debug:router

app_home:
    path: /
    controller: App\Controller\HomeController::index

app_login_redirect:
    path: /login
    controller: App\Controller\SecurityController::loginRedirect
    methods: [GET]

app_login:
    path: /login
    controller: App\Controller\SecurityController::loginCheck
    methods: [POST]

app_login_client:
    path: /login/client
    controller: App\Controller\SecurityController::loginClient
    methods: [GET]

app_login_banque:
    path: /login/banque
    controller: App\Controller\SecurityController::loginBanque
    methods: [GET]

app_login_admin:
    path: /login/admin
    controller: App\Controller\SecurityController::loginAdmin
    methods: [GET]

app_logout:
    path: /logout
    controller: App\Controller\SecurityController::logout

app_admin_dashboard:
    path: /admin
    controller: App\Controller\Admin\AdminDashboardController::index

app_admin_banque_activer:
    path: /admin/banque/{id}/activer
    controller: App\Controller\Admin\AdminDashboardController::activerBanque
    methods: [POST]

app_admin_banque_desactiver:
    path: /admin/banque/{id}/desactiver
    controller: App\Controller\Admin\AdminDashboardController::desactiverBanque
    methods: [POST]

app_client_transactions:
    path: /client/transactions
    controller: App\Controller\ClientController::transactions
    methods: [GET]

app_banque_inscription:
    path: /banque/inscription
    controller: App\Controller\BanqueController::inscription
    methods: [GET, POST]

app_client_inscription:
    path: /client/inscription
    controller: App\Controller\ClientController::inscription
    methods: [GET, POST]

app_client_dashboard:
    path: /client/dashboard
    controller: App\Controller\ClientController::dashboard
    methods: [GET]

app_client_comptes:
    path: /client/comptes
    controller: App\Controller\ClientController::comptes
    methods: [GET]

app_client_compte_show:
    path: /client/compte/{id}
    controller: App\Controller\ClientController::showCompte
    methods: [GET]

app_client_compte_depot:
    path: /client/compte/{id}/depot
    controller: App\Controller\ClientController::depotCompte
    methods: [POST]

app_client_compte_retrait:
    path: /client/compte/{id}/retrait
    controller: App\Controller\ClientController::retraitCompte
    methods: [POST]

app_client_virement:
    path: /client/virement
    controller: App\Controller\ClientController::virement
    methods: [GET, POST]

app_client_profil:
    path: /client/profil
    controller: App\Controller\ClientController::profil
    methods: [GET, POST]

app_banque_dashboard:
    path: /banque/dashboard
    controller: App\Controller\BanqueController::dashboard
    methods: [GET]

app_banque_clients:
    path: /banque/clients
    controller: App\Controller\BanqueController::clients
    methods: [GET]

app_banque_client_show:
    path: /banque/client/{id}
    controller: App\Controller\BanqueController::showClient
    methods: [GET]

app_banque_client_activer:
    path: /banque/client/{id}/activer
    controller: App\Controller\BanqueController::activerClient
    methods: [POST]

app_banque_client_desactiver:
    path: /banque/client/{id}/desactiver
    controller: App\Controller\BanqueController::desactiverClient
    methods: [POST]

app_banque_compte_activer:
    path: /banque/compte/{id}/activer
    controller: App\Controller\BanqueController::activerCompte
    methods: [POST]

app_banque_compte_desactiver:
    path: /banque/compte/{id}/desactiver
    controller: App\Controller\BanqueController::desactiverCompte
    methods: [POST]

app_banque_compte_create:
    path: /banque/compte/create
    controller: App\Controller\BanqueController::createCompte
    methods: [GET, POST]
