framework:
    rate_limiter:
        # Limiteur de connexion (5 tentatives par minute par IP)
        login_ip:
            policy: sliding_window
            limit: 5
            interval: '60 seconds'

        # Limiteur par username (5 tentatives par minute par utilisateur)
        login_username:
            policy: sliding_window
            limit: 5
            interval: '60 seconds'

        # Limiteur global (éviter les attaques massives)
        api_global:
            policy: token_bucket
            limit: 100
            rate: { amount: 100, interval: '60 seconds' }
